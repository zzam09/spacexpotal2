kind = "web"
previewPath = "/"
title = "SpaceX Membership Portal"
version = "1.0.0"
id = "artifacts/spacex"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19742

[services.development]
run = "pnpm --filter @workspace/spacex run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spacex", "run", "build" ]
publicDir = "artifacts/spacex/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19742"
BASE_PATH = "/"
